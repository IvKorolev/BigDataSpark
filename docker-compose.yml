version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: highload_lab2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lab2_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql_scripts:/docker-entrypoint-initdb.d
      - ./data:/data
    networks:
      - lab2_network

  spark-jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./work:/home/jovyan/work
      - ./spark:/home/jovyan/spark
      - ./data:/home/jovyan/data
    networks:
      - lab2_network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_lab2
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: default
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - lab2_network

networks:
  lab2_network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data: